name: Continuous Integration

on:
  push:
    branches:
      - master
      - dev
      - 'feature/**'

  pull_request:
    branches:
      - master
      - dev

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FightClub.slnx

      - name: Build
        run: dotnet build FightClub.slnx --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test FightClub.slnx --configuration Release --no-build

      - name: Verify Formatting
        run: dotnet format FightClub.slnx --verify-no-changes

      - name: Build Docker Image
        run: docker build -f src/FightClub.Api/Dockerfile -t fightclub-api .