name: Release

on:
  push:
    branches:
      - master

jobs:

  release:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore FightClub.slnx

      - run: dotnet build FightClub.slnx --configuration Release

      - run: docker build -f src/FightClub.Api/Dockerfile -t fightclub-api .